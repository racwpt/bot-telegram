<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Pelanggan</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        h2 {
            animation: fadeIn 2s ease-in-out;
        }

        table {
            margin: auto;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
        }

        th {
            background: #2a5298;
            color: white;
        }

        tr:hover {
            background: #f2f2f2;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .logo {
            width: 100px;
            animation: spin 5s linear infinite;
        }

        @keyframes spin {
            0% {transform: rotate(0);}
            100% {transform: rotate(360deg);}
        }
    </style>

</head>

<body>

    <img src="https://cdn-icons-png.flaticon.com/512/1041/1041884.png" class="logo">

    <h2>📡 MONITORING PELANGGAN INTERNET</h2>

    <table border="1">
        <tr>
            <th>Nama</th>
            <th>ID</th>
            <th>SN</th>
        </tr>

        {% for d in data %}
        <tr>
            <td>{{ d[1] }}</td>
            <td>{{ d[2] }}</td>
            <td>{{ d[3] }}</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
