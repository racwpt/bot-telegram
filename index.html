<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>
    <h2>DATA PELANGGAN</h2>

    <table border="1">
        <tr>
            <th>Nama</th>
            <th>ID</th>
            <th>SN</th>
        </tr>

        {% for d in data %}
        <tr>
            <td>{{ d[1] }}</td>
            <td>{{ d[2] }}</td>
            <td>{{ d[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
